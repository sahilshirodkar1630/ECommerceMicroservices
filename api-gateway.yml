spring:
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: LoggingOrdersFilter
            - name: Authentication
              args:
                isEnabled: true
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - AddRequestHeader=X-Custom-Header, Sahil


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

